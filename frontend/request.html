<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Help</title>

    <link rel="stylesheet" href="css/request.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="help-card">

        <h1>Request Roadside Assistance</h1>
        <p>Tell us your problem and we'll connect you with the nearest mechanic.</p>

        <form id="helpForm">

            <!-- Vehicle Type -->
            <div class="input-box">
                <label>Vehicle Type</label>

                <select id="vehicleType" required>
                    <option value="">Select Vehicle</option>
                    <option>Bike</option>
                    <option>Car</option>
                    <option>Scooter</option>
                    <option>Truck</option>
                    <option>Bus</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- Problem Category -->
            <div class="input-box">
                <label>Problem Category</label>

                <select id="problemCategory" required>
                    <option value="">Select Problem</option>
                    <option>Flat Tire</option>
                    <option>Battery Issue</option>
                    <option>Engine Failure</option>
                    <option>Fuel Delivery</option>
                    <option>Brake Issue</option>
                    <option>Accident Assistance</option>
                    <option>Towing Service</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- Priority -->
            <div class="input-box">
                <label>Priority</label>

                <select id="priority">
                    <option>Low</option>
                    <option>Normal</option>
                    <option>Urgent</option>
                    <option>Emergency</option>
                </select>
            </div>

            <!-- Current Location -->
            <div class="input-box">
                <label>Current Location</label>

                <input
                type="text"
                id="location"
                placeholder="Enter your current location"
                required>
            </div>

            <!-- GPS Button -->
            <button type="button" class="location-btn">
                <i class="fa-solid fa-location-dot"></i>
                Use My Current Location
            </button>

            <!-- Contact Number -->
            <div class="input-box">
                <label>Contact Number</label>

                <input
                type="tel"
                id="phone"
                placeholder="Enter your mobile number"
                required>
            </div>

            <!-- Issue Title -->
            <div class="input-box">
                <label>Issue Title</label>

                <input
                type="text"
                id="title"
                placeholder="Short title of your problem"
                required>
            </div>

            <!-- Description -->
            <div class="input-box">
                <label>Problem Description</label>

                <textarea
                id="description"
                rows="5"
                placeholder="Describe your vehicle problem..."
                required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-paper-plane"></i>
                Request Assistance
            </button>

        </form>

    </div>

</div>

<script src="js/request.js"></script>

</body>
</html>
